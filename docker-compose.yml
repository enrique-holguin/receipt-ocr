services:
  postgres:
    image: postgres:16-alpine
    container_name: read_payments_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-read_payments}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-read_payments}
      POSTGRES_DB: ${POSTGRES_DB:-read_payments}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-read_payments} -d ${POSTGRES_DB:-read_payments}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
